<div class="register-page d-flex align-items-center justify-content-center">
  <div class="register-card card shadow-lg border-0">
    <!-- Header -->
    <div class="card-header-custom text-center">
      <div class="brand-icon mx-auto mb-3">
        <i class="bi bi-person-plus-fill text-white fs-2"></i>
      </div>
      <h4 class="fw-bold text-white mb-1">Create Account</h4>
      <p class="text-white-50 mb-0 small">Join RetailOrder today</p>
    </div>

    <!-- Form -->
    <div class="card-body p-4">
      @if (error()) {
        <div class="alert alert-danger py-2 small d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-circle"></i>{{ error() }}
        </div>
      }

      @if (success()) {
        <div class="alert alert-success py-2 small d-flex align-items-center gap-2">
          <i class="bi bi-check-circle"></i>Account created! Redirecting...
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input
              type="text"
              class="form-control"
              placeholder="John Doe"
              [ngModel]="name()"
              (ngModelChange)="name.set($event)"
              name="name"
              required
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              placeholder="you@example.com"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              name="email"
              required
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control"
              placeholder="Min. 6 characters"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              required
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
            <input
              type="password"
              class="form-control"
              placeholder="Re-enter password"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)"
              name="confirmPassword"
              required
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 fw-semibold py-2"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>Creating account...
          } @else {
            <i class="bi bi-person-plus me-2"></i>Create Account
          }
        </button>
      </form>

      <div class="text-center mt-4">
        <span class="text-muted small">Already have an account?</span>
        <a routerLink="/login" class="text-primary fw-semibold small ms-1">Sign in</a>
      </div>
    </div>
  </div>
</div>
