<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Inventory Status</h4>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="bg-light">
        <tr>
          <th class="ps-3 py-3">Variant Name</th>
          <th class="py-3">Product</th>
          <th class="py-3 text-center">Price</th>
          <th class="py-3 text-center">Status</th>
        </tr>
      </thead>
      <tbody>
        @if (variantService.loading()) {
          <tr><td colspan="4" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary"></span></td></tr>
        } @else {
          @for (v of variantService.variants(); track v.id) {
            <tr>
              <td class="ps-3 fw-bold">{{ v.variantName }}</td>
              <td>{{ v.product?.name || 'Product #' + v.productId }}</td>
              <td class="text-center">₹{{ v.price }}</td>
              <td class="text-center">
                <span class="badge bg-success">In Stock</span>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="4" class="text-center py-4 text-muted small">No inventory found.</td></tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>
