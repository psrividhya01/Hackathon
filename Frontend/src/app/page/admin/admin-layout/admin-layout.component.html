<div class="admin-wrapper d-flex">
  <!-- Sidebar -->
  <aside class="admin-sidebar bg-dark text-white">
    <div class="sidebar-header p-4 border-bottom border-secondary">
      <div class="d-flex align-items-center gap-2 mb-1">
        <i class="bi bi-shield-lock-fill text-primary fs-3"></i>
        <h5 class="fw-bold mb-0">Admin Panel</h5>
      </div>
      <small class="text-secondary">RetailOrder Management</small>
    </div>

    <nav class="sidebar-nav p-3">
      <div class="nav-group mb-4">
        <label class="nav-label mb-2">CATALOG</label>
        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a routerLink="./categories" routerLinkActive="active" class="nav-link">
              <i class="bi bi-grid me-2"></i>Categories
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="./brands" routerLinkActive="active" class="nav-link">
              <i class="bi bi-tag me-2"></i>Brands
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="./products" routerLinkActive="active" class="nav-link">
              <i class="bi bi-box-seam me-2"></i>Products
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="./variants" routerLinkActive="active" class="nav-link">
              <i class="bi bi-layers me-2"></i>Variants
            </a>
          </li>
        </ul>
      </div>

      <div class="nav-group mb-4">
        <label class="nav-label mb-2">SALES</label>
        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a routerLink="./orders" routerLinkActive="active" class="nav-link">
              <i class="bi bi-bag-check me-2"></i>Orders
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="./inventory" routerLinkActive="active" class="nav-link">
              <i class="bi bi-list-check me-2"></i>Inventory
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="sidebar-footer p-3 mt-auto border-top border-secondary">
      <div class="d-flex align-items-center gap-3 mb-3">
        <div class="avatar-sm bg-primary rounded-circle d-flex align-items-center justify-content-center">
          <i class="bi bi-person text-white"></i>
        </div>
        <div class="overflow-hidden">
          <div class="fw-bold text-truncate small">{{ auth.user()?.name }}</div>
          <div class="text-secondary extra-small">Administrator</div>
        </div>
      </div>
      <div class="d-grid gap-2">
        <a routerLink="/home" class="btn btn-outline-light btn-sm">
          <i class="bi bi-house me-2"></i>Main Site
        </a>
        <button (click)="logout()" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-content flex-grow-1 bg-light">
    <div class="container-fluid p-4">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
