<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0">Manage Categories</h4>
</div>

<div class="row g-4">
  <!-- Form -->
  <div class="col-12 col-md-4">
    <div class="card shadow-sm p-4">
      <h6 class="fw-bold mb-3">{{ isEditing() ? 'Edit' : 'Add New' }} Category</h6>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Category Name</label>
          <input type="text" class="form-control" placeholder="e.g. Breads" 
            [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" required>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-sm flex-grow-1" [disabled]="!name()">
            {{ isEditing() ? 'Update' : 'Create' }}
          </button>
          @if (isEditing()) {
            <button type="button" class="btn btn-outline-secondary btn-sm" (click)="reset()">Cancel</button>
          }
        </div>
      </form>
    </div>
  </div>

  <!-- List -->
  <div class="col-12 col-md-8">
    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="bg-light">
            <tr>
              <th class="ps-3 py-3">ID</th>
              <th class="py-3">Name</th>
              <th class="py-3 text-end pe-3">Actions</th>
            </tr>
          </thead>
          <tbody>
            @if (categoryService.loading()) {
              <tr><td colspan="3" class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary"></span></td></tr>
            } @else {
              @for (cat of categoryService.categories(); track cat.id) {
                <tr>
                  <td class="ps-3">#{{ cat.id }}</td>
                  <td><span class="fw-semibold">{{ cat.name }}</span></td>
                  <td class="text-end pe-3">
                    <button class="btn btn-link text-primary btn-sm" (click)="edit(cat)">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-link text-danger btn-sm" (click)="delete(cat.id)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              } @empty {
                <tr><td colspan="3" class="text-center py-4 text-muted small">No categories found.</td></tr>
              }
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
