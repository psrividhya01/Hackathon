<div class="login-page d-flex align-items-center justify-content-center">
  <div class="login-card card shadow-lg border-0">
    <!-- Header -->
    <div class="card-header-custom text-center">
      <div class="brand-icon mx-auto mb-3">
        <i class="bi bi-basket2-fill text-white fs-2"></i>
      </div>
      <h4 class="fw-bold text-white mb-1">Welcome Back</h4>
      <p class="text-white-50 mb-0 small">Sign in to your RetailOrder account</p>
    </div>

    <!-- Form -->
    <div class="card-body p-4">
      @if (error()) {
        <div class="alert alert-danger py-2 small d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-circle"></i>{{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              placeholder="you@example.com"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              name="email"
              required
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control"
              placeholder="Enter your password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              required
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 fw-semibold py-2"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
          } @else {
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          }
        </button>
      </form>

      <div class="text-center mt-4">
        <span class="text-muted small">Don't have an account?</span>
        <a routerLink="/register" class="text-primary fw-semibold small ms-1">Create one</a>
      </div>
    </div>
  </div>
</div>
